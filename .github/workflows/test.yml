name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # PR diff check（テスト漏れ検知）に必要

      # PR で Sources/WindowSnapCore/ を変更したのに Tests/ を変更していなければ fail
      - name: Check for missing tests
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          CORE_CHANGED=$(echo "$CHANGED" | grep '^Sources/WindowSnapCore/' | wc -l | tr -d ' ')
          TESTS_CHANGED=$(echo "$CHANGED" | grep '^Tests/' | wc -l | tr -d ' ')
          echo "Core changed: ${CORE_CHANGED} file(s)"
          echo "Tests changed: ${TESTS_CHANGED} file(s)"
          if [ "$CORE_CHANGED" -gt 0 ] && [ "$TESTS_CHANGED" -eq 0 ]; then
            echo "::error::Sources/WindowSnapCore/ was modified without changes in Tests/. Add or update tests."
            exit 1
          fi

      - name: Build
        run: swift build

      - name: Test with coverage
        run: swift test --enable-code-coverage

      # WindowSnapCore の行カバレッジが 80% 未満なら fail（executable グルー層は対象外）
      - name: Check coverage threshold (WindowSnapCore >= 80%)
        run: |
          BINARY=$(find .build/debug -name 'WindowSnapPackageTests' ! -path '*.dSYM*' -type f | head -1)
          PROFDATA=$(find .build/debug/codecov -name '*.profdata' | head -1)
          echo "Binary:   ${BINARY}"
          echo "Profdata: ${PROFDATA}"
          REPORT=$(xcrun llvm-cov report "${BINARY}" \
            -instr-profile="${PROFDATA}" \
            Sources/WindowSnapCore/)
          echo "$REPORT"
          COVERAGE=$(echo "$REPORT" | awk '/^TOTAL/{gsub(/%/,"",$NF); print $NF}')
          echo "WindowSnapCore line coverage: ${COVERAGE}%"
          if awk "BEGIN{exit !(${COVERAGE}+0 < 80)}"; then
            echo "::error::WindowSnapCore coverage ${COVERAGE}% is below 80%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% >= 80% ✓"
